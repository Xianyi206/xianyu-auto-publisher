# ============================================================
# 闲鱼项目配置文件
# ============================================================
# 所有路径中 ~ 表示当前用户目录，会被自动展开
# 相对路径相对于本配置文件所在目录解析
# ============================================================

# === 路径配置 ===
paths:
  # Z盘产品图片根目录
  z_root: "D:\\10 轮椅租赁"
  # 处理后图片输出目录
  out_dir: "~\\.hermes\\tmp\\xianyu_publish"
  # 配字字体文件
  font_path: "~\\.hermes\\fonts\\ZCOOLKuaiLe-Regular.ttf"
  # 发布日志文件
  log_file: "~\\.hermes\\logs\\xianyu_v21.log"
  # Cookie状态文件
  state_file: "D:\\BaiduSyncdisk\\8 本地推素材\\闲鱼Cookie\\闲鱼Cookie.txt"
  # 临时图片目录（发布时读取预处理结果）
  tmp_dir: "~\\.hermes\\tmp\\xianyu_publish"

# === 图片处理参数 ===
image:
  target_width: 1440               # 目标宽度(px)
  target_height: 1920              # 目标高度(px)
  font_size: 380                   # 配字字号
  text_color: [220, 25, 25]        # 文字颜色 RGB
  shadow_color: [255, 255, 255, 180]  # 阴影颜色 RGBA
  shadow_offset: 10                # 阴影偏移(px)
  jitter_x: 15                     # 文字水平抖动范围(px)
  jitter_y: 10                     # 文字垂直抖动范围(px)
  text_y: 80                       # 文字起始Y坐标(px)

# === 选图配置 ===
selection:
  # 主力产品线（优先各选1张）
  primary_product_dirs:
    - "1 飞机轮椅"
    - "2 手动轮椅SYIV100"
    - "3 HM309"
    - "8 移位机"
  # 备用产品线（主力不足时补选，同目录可出2张）
  backup_product_dirs:
    - "5EY19"
    - "7 EY18"
    - "9 组合"
  # 真人图目录
  person_dirs:
    - "4 EY500-16"
    - "宣传图片"
  # 优先使用的真人图片文件名
  preferred_person_images:
    - "IMG_0382.jpg"
    - "IMG_0382.JPG"
  # 需要的产品图数量
  product_count: 4
  # 需要的真人图数量
  person_count: 1

# === Z盘重试配置 ===
retry:
  max_retries: 3                   # 最大重试次数
  timeout: 15                      # 单次探测超时(秒)
  base_delay: 5                    # 重试基础延迟(秒)

# === 发布配置 ===
publish:
  price: 9.9                       # 价格（元/天）
  viewport_width: 1280             # 浏览器窗口宽度(px)
  viewport_height: 900             # 浏览器窗口高度(px)
  province: "江苏省"               # 省
  city: "苏州市"                   # 市
  district: "昆山市"               # 区/镇

  # 方向文案（根据时段选择索引0-4）
  directions:
    - "苏州轮椅租赁，短期使用按天租"
    - "昆山轮椅出租，老人出行临时用"
    - "医院术后康复轮椅租赁，送货上门"
    - "旅游临时轮椅出租，苏州景区可用"
    - "老人代步轮椅出租，工厂直租更省心"

  # 描述文案模板（{direction} 会被替换为当前方向文案）
  description: |
    {direction}！最低9.9元/天起

    受伤临时租用、术后康复、旅游代步、老人出行统统搞定

    中国驰名商标佳康顺，大牌子质量有保障，几乎全新，每次用完都深度消毒

    昆山工厂和苏州门店均通借通还，全城可自取/送货上门，昆山张浦厂家和苏州阳光大厦门店可通借通取

    可租赁辅具：手动轮椅、电动轮椅、老年代步车、移位机、起身器

    不用了随时还，没有任何隐形费用。点右下角「我想要」直接咨询

    #轮椅出租 #轮椅租赁 #出行辅助 #昆山轮椅 #佳康顺

  # 发布按钮常见坐标位置
  publish_button_x: 600
  publish_button_y: 850
